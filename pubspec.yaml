name: flutter_sms
description: "[DISCONTINUED] This fork is no longer maintained. Please use the flutter_sms package on pub.dev (https://pub.dev/packages/flutter_sms). A Flutter plugin to Send SMS and MMS on iOS and Android."
version: 2.3.4
homepage: https://github.com/rodydavis/plugins
repository: https://github.com/fluttercommunity/flutter_sms
maintainer: Rody Davis (@rodydavis)

environment:
  sdk: ">=2.12.0 <3.0.0"
  flutter: ^1.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  plugin_platform_interface: ^2.0.0
  url_launcher: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.example.flutter_sms
        pluginClass: FlutterSmsPlugin
      ios:
        pluginClass: FlutterSmsPlugin
      web:
        pluginClass: FlutterSmsPlugin
        fileName: flutter_sms_web.dart
